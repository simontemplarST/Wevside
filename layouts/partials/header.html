<header class="masthead" data-label="Header">
  <div>
    <h1 class="callsign"><a href="{{ site.Home.RelPermalink }}">{{ .Site.Params.callsign }}</a></h1>
    <p class="sub">{{ .Site.Params.operator }} &middot; {{ .Site.Params.qth }} &middot; {{ .Site.Params.licenseClass }}</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
    <span class="onair" id="onair" title="Live status from PSKReporter">
      <span class="dot"></span><span class="state"></span>
    </span>
    <!-- CW: CQ <AR>  ("calling any station") -->
    <span class="morse">−·−·  −−·−  ·−·−·</span>
  </div>
</header>

<script>
(function () {
  // ON AIR light. Reads on-air.json, which a scheduled GitHub Action refreshes
  // from PSKReporter every ~15 min (see .github/workflows/hugo.yml). All hosting
  // and updating stays on GitHub — no external services.
  var el = document.getElementById("onair");
  if (!el) return;
  var URL = "{{ "on-air.json" | relURL }}";
  var FRESH_MIN = {{ .Site.Params.onAirFreshMin | default 12 }};

  function tick() {
    fetch(URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d) { el.classList.add("is-stale"); return; }
        var now = Date.now() / 1000;
        var ageMin = (now - (d.last_heard || 0)) / 60;
        var live = !!d.last_heard && ageMin <= FRESH_MIN;
        // status file itself gone stale (Action not running) => dim
        var stale = (now - (d.updated || 0)) / 60 > 20;
        el.classList.toggle("is-live", live);
        el.classList.toggle("is-stale", stale && !live);
        el.title = live
          ? "Heard " + Math.round(ageMin) + " min ago" +
            (d.receiver_count ? " by " + d.receiver_count + " station(s)" : "") + " on PSKReporter"
          : (stale ? "On-air status unavailable"
                   : "Not heard on PSKReporter in the last " + FRESH_MIN + " min");
      })
      .catch(function () { el.classList.add("is-stale"); });
  }
  tick();
  setInterval(tick, 60000);
})();
</script>

<nav class="nav" data-label="Nav">
  {{ range .Site.Menus.main }}
    {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
    <a href="{{ .URL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
  {{ end }}
</nav>
