name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Refresh the ON AIR badge from PSKReporter, server-side, entirely on GitHub.
  # 15 min stays well clear of PSKReporter's 1-query-per-5-min limit.
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.158.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo (extended)
        run: |
          curl -sSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -o /tmp/hugo.deb
          sudo dpkg -i /tmp/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build
        run: |
          hugo --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Refresh ON AIR status from PSKReporter
        # Regenerates on-air.json in the built site from live PSKReporter data.
        # Exit code 1 just means "off air" — never fail the deploy on it.
        run: |
          python3 scripts/on-air-light.py --once \
            -c "${{ vars.ONAIR_CALLSIGN || 'N0YEP' }}" \
            -o ./public/on-air.json \
            --appcontact "${{ secrets.PSK_CONTACT }}" || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
